<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking de Profesores por Materia</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f9fc; color: #1f2937; }
    .card { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 16px rgba(0, 0, 0, .08); }
    h1 { margin-top: 0; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    input, select, button { font-size: 16px; padding: 10px 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    input { min-width: 260px; }
    select { background: #fff; }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .status { margin: 10px 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eff6ff; position: sticky; top: 0; }
    .top3 { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px 12px; border-radius: 8px; margin-top: 14px; }
    .small { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ranking de Profesores por Materia</h1>
    <p class="small">Modelo robusto con regularizacion Bayesiana y penalizacion por incertidumbre.</p>

    <div class="row">
      <input id="materia" type="text" placeholder="Ejemplo: MATG1001" />
      <select id="ordenarPor" aria-label="Ordenar por">
        <option value="score">Score</option>
        <option value="promedio">Promedio</option>
        <option value="desv">Desviacion estandar</option>
        <option value="errorStd">Error estandar</option>
        <option value="n">Cantidad de datos</option>
        <option value="profesor">Profesor</option>
      </select>
      <select id="direccionOrden" aria-label="Direccion del orden">
        <option value="desc">Mayor a menor</option>
        <option value="asc">Menor a mayor</option>
      </select>
      <button id="buscar">Analizar</button>
    </div>

    <div id="status" class="status"></div>

    <div id="resultados"></div>
  </div>

  <script>
    const API_BASE = 'https://wssaac.espol.edu.ec/heteroevaluacion-reportes/api/reportes/paralelos-materia';
    let resultadosActuales = [];
    let materiaActual = '';

    function normalizarTexto(texto) {
      if (!texto) return '';
      return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toUpperCase();
    }

    function calcularScore(prom, stdDev, n, base = 80, k = 5, z = 1.28) {
      if (!n) return { score: 0, scoreReg: 0, se: 0 };
      const scoreReg = ((n * prom) + (k * base)) / (n + k);
      const se = stdDev / Math.sqrt(n);
      const lowerBound = scoreReg - (z * se);
      const penalizacionExtra = Math.max(0, stdDev - 6) * 0.5;
      const score = lowerBound - penalizacionExtra;
      return { score, scoreReg, se };
    }

    function format(n) {
      return Number.isFinite(n) ? n.toFixed(2) : '-';
    }

    function ordenarResultados(resultados) {
      const ordenarPor = document.getElementById('ordenarPor').value;
      const direccion = document.getElementById('direccionOrden').value;
      const factor = direccion === 'asc' ? 1 : -1;

      return [...resultados].sort((a, b) => {
        if (ordenarPor === 'profesor') {
          return a.profesor.localeCompare(b.profesor) * factor;
        }

        return ((a[ordenarPor] ?? 0) - (b[ordenarPor] ?? 0)) * factor;
      });
    }

    function renderResultados() {
      const status = document.getElementById('status');
      const resultadosDiv = document.getElementById('resultados');

      if (!resultadosActuales.length) return;

      const resultados = ordenarResultados(resultadosActuales);
      const criterio = document.getElementById('ordenarPor').selectedOptions[0].textContent;
      status.textContent = `OK: ${resultados.length} profesores analizados para ${materiaActual}. Ordenado por ${criterio}.`;

      const top3 = resultados.slice(0, 3).map((r, i) =>
        `<li><strong>${i + 1}.</strong> ${r.profesor} - Score: ${format(r.score)} | Prom: ${format(r.promedio)} | Desv: ${format(r.desv)} (n=${r.n})</li>`
      ).join('');

      const rows = resultados.map(r => `
        <tr>
          <td>${r.profesor}</td>
          <td>${format(r.score)}</td>
          <td>${format(r.promedio)}</td>
          <td>${format(r.desv)}</td>
          <td>${format(r.errorStd)}</td>
          <td>${r.n}</td>
        </tr>
      `).join('');

      resultadosDiv.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Profesor</th>
              <th>Score</th>
              <th>Prom</th>
              <th>Desv</th>
              <th>Error Std</th>
              <th>n</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="top3">
          <strong>Primeros 3 segun el orden actual</strong>
          <ol>${top3}</ol>
        </div>
      `;
    }

    async function analizarMateria() {
      const input = document.getElementById('materia');
      const btn = document.getElementById('buscar');
      const status = document.getElementById('status');
      const resultadosDiv = document.getElementById('resultados');

      const materia = input.value.trim().toUpperCase();
      if (!materia) {
        status.textContent = 'Ingresa un codigo de materia.';
        return;
      }

      btn.disabled = true;
      status.textContent = `Analizando ${materia}...`;
      resultadosDiv.innerHTML = '';
      resultadosActuales = [];
      materiaActual = materia;

      try {
        const url = `${API_BASE}/${encodeURIComponent(materia)}/1/200`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const payload = await res.json();
        const data = payload?.datos || [];

        if (!data.length) {
          status.textContent = 'No hay datos disponibles para esa materia.';
          return;
        }

        const profesores = new Map();

        for (const inst of data) {
          const prof = normalizarTexto(`${inst.apellidos || ''} ${inst.nombres || ''}`);
          const nota = Number(inst.promedio);

          if (prof && Number.isFinite(nota)) {
            if (!profesores.has(prof)) profesores.set(prof, []);
            profesores.get(prof).push(nota);
          }
        }

        const resultados = [];
        for (const [prof, notas] of profesores.entries()) {
          const n = notas.length;
          const prom = notas.reduce((a, b) => a + b, 0) / n;
          const variance = notas.reduce((acc, x) => acc + ((x - prom) ** 2), 0) / n;
          const stdDev = Math.sqrt(variance);
          const { score, se } = calcularScore(prom, stdDev, n);

          resultados.push({
            profesor: prof,
            score,
            promedio: prom,
            desv: stdDev,
            errorStd: se,
            n
          });
        }

        resultadosActuales = resultados;
        renderResultados();
      } catch (error) {
        status.textContent = `Error al consultar datos: ${error.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('buscar').addEventListener('click', analizarMateria);
    document.getElementById('ordenarPor').addEventListener('change', renderResultados);
    document.getElementById('direccionOrden').addEventListener('change', renderResultados);
    document.getElementById('materia').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') analizarMateria();
    });
  </script>
</body>
</html>
